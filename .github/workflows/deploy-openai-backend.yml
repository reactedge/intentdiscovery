name: Deploy OpenAI Backend

on:
  push:
    tags:
      - "intent-discovery*"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: reactedge

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy backend via rsync
        run: |     
          rsync -avzr --delete \
            --chown=www-data:www-data \
            node-backend/ \
            ${{ secrets.WIDGET_SSH_USER }}@${{ secrets.WIDGET_SSH_HOST }}:/var/www/openai-express/

      - name: Install backend dependencies
        run: |
          ssh -o StrictHostKeyChecking=no \
          ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
          "cd /var/www/openai-express && npm install --omit=dev"

      - name: Restart backend
        run: |
          ssh -o StrictHostKeyChecking=no \
          ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
          "pm2 restart openai-express || pm2 start /var/www/openai-express/"